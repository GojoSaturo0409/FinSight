services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: finsight_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

  backend:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - db
      - rabbitmq
    volumes:
      - ./backend:/app
    environment:
      - SECRET_KEY=supersecretkey
    env_file:
      - ./backend/.env

  ingestion:
    build: ./backend
    command: uvicorn main_ingestion:app --host 0.0.0.0 --port 8001 --reload
    restart: always
    ports:
      - "8001:8001"
    depends_on:
      - db
      - rabbitmq
    volumes:
      - ./backend:/app
    environment:
      - SECRET_KEY=supersecretkey
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

volumes:
  pgdata:
